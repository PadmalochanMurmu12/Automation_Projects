name: FoodKart Playwright Suite

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'FoodKart-Playwright-Automation/**'
      - '.github/workflows/playwright-bddAutomationSuite.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'FoodKart-Playwright-Automation/**'
      - '.github/workflows/playwright-bddAutomationSuite.yml'
      
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./FoodKart-Playwright-Automation

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' 
        cache: 'npm'
        cache-dependency-path: './FoodKart-Playwright-Automation/package-lock.json'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🎭 Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: 🚀 Execute Tests
      run: npm run test
      env:
        BASE_URL: ${{ vars.BASE_URL }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    - name: 📊 Upload Allure Results Artifact
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: allure-raw-results
        path: FoodKart-Playwright-Automation/allure-results/
        retention-days: 7